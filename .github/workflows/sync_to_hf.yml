name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Hugging Face Hub
        run: pip install huggingface_hub
        
      - name: Deploy to Hugging Face via Python API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "from huggingface_hub import HfApi; import os; HfApi().upload_folder(folder_path='.', repo_id='Digonta2002/skin-disease-detector', repo_type='space', token=os.environ['HF_TOKEN'], ignore_patterns=['.git/*'])"